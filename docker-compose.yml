services:
  domilix-beta:
    image: ghcr.io/jack0237/domilix-beta:latest
    build: .
    container_name: domilix-beta
    restart: unless-stopped
    ports:
      - "${HOST_PORT:-3001}:3001"
    env_file:
      - .env
    volumes:
      - ./data:/app/data
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/api/health"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3
